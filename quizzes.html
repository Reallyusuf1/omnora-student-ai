<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quizzes - Omnora Student AI</title>
    <link rel="stylesheet" href="css/quizzes.css/quizzes.css">
</head>
<body>
    <div class="registration-container">

    <h1>Student Registration</h1>
    <p>Complete your information before starting today's quiz.</p>

    <form id="registrationForm">

        <input
            type="text"
            id="fullName"
            placeholder="Full Name"
            required
        >

        <input
            type="text"
            id="schoolName"
            placeholder="School Name"
            required
        >

        <input
            type="text"
            id="admissionNumber"
            placeholder="Admission Number"
            required
        >

        <select id="country" required>
            <option value="">Select Country</option>
        </select>

        <select id="studentClass" required>
            <option value="">Select Class</option>

            <optgroup label="Primary">
                <option>Primary 1</option>
                <option>Primary 2</option>
                <option>Primary 3</option>
                <option>Primary 4</option>
                <option>Primary 5</option>
                <option>Primary 6</option>
            </optgroup>

            <optgroup label="Junior Secondary">
                <option>JSS 1</option>
                <option>JSS 2</option>
                <option>JSS 3</option>
            </optgroup>

            <optgroup label="Senior Secondary">
                <option>SSS 1</option>
                <option>SSS 2</option>
                <option>SSS 3</option>
            </optgroup>

        </select>

        <input
            type="password"
            id="quizPin"
            maxlength="4"
            placeholder="4 Digit Quiz PIN"
            required
        >

        <button type="submit" id="startQuizBtn">
            Start Quiz
        </button>

    </form>

                    </div>
    <div id="quizContainer" class="quiz-container" style="display:none;">

    <h1>Daily Quiz</h1>

    <div class="score">0/10 Points</div>

    <div class="quiz-progress">

        <div id="progressText">
            Question 1 / 10
        </div>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <div id="timer">
            10:00
        </div>

    </div>

    <div id="quizQuestion" class="question"></div>

    <div id="quizOptions" class="options"></div>

    <button id="nextBtn" onclick="nextQuestion()">
        Next
    </button>

    <script src="js/quizzes.js/quizzes.js"></script>
</body>
</html>
