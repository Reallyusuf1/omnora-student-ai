<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Profile | Omnora Students AI</title>

    <link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/main.css">
</head>

<body>

    <main class="profile-page">

        <!-- =========================
             PROFILE HEADER
        ========================== -->

        <section class="profile-header">

            <div class="profile-avatar">

                <img
                    src="assets/images/default-avatar.png"
                    alt="Student Profile Picture">

            </div>

            <button
                id="change-photo-btn">

                Change Profile Photo

            </button>

            <h1 id="student-name">

                Student Name

            </h1>

            <p id="member-since">

                Joined Omnora • 2026

            </p>

        </section>

        <!-- =========================
             ACCOUNT INFORMATION
        ========================== -->

        <section class="profile-card">

            <h2>

                Account Information

            </h2>

            <div class="profile-item">

                <span>Full Name</span>

                <p id="full-name"></p>

            </div>

            <div class="profile-item">

                <span>School Name</span>

                <p id="school-name"></p>

            </div>

            <div class="profile-item">

                <span>Class</span>

                <p id="student-class"></p>

            </div>

            <div class="profile-item">

                <span>Admission Number</span>

                <p id="admission-number"></p>

            </div>

        </section>

        <!-- =========================
             SETTINGS
        ========================== -->

        <section class="profile-card">

            <h2>

                Settings

            </h2>

            <button id="edit-profile-btn">

                Edit Profile

            </button>

            <button id="change-pin-btn">

                Change PIN

            </button>

            <button id="theme-btn">

                Theme

            </button>

            <button id="logout-btn">

                Logout

            </button>

        </section>

        <!-- =========================
             DANGER ZONE
        ========================== -->

        <section class="danger-zone">

            <h2>

                Danger Zone

            </h2>

            <button id="delete-account-btn">

                Delete Account

            </button>

        </section>

    </main>

    <script src="js/question-bank.js/question-bank.js"></script>
        
    <script src="js/profile-page.js/profile-page.js"></script>

</body>

</html>
