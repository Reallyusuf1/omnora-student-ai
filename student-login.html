<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login | Omnora Students AI</title>

    <meta
        name="description"
        content="Sign in to your Omnora Students AI account using your Omnora Student ID."
    >

    <link rel="icon" href="assets/images/favicon.png">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/main.css">

    <link rel="stylesheet" href="css/student-login.css">

</head>

<body>

<main class="student-login-page">

    <!-- Hero -->

    <section class="login-hero">

        <div class="container">

            <span class="section-tag">
                🔐 Student Login
            </span>

            <h1>
                Welcome Back to Omnora Students AI
            </h1>

            <p class="hero-text">
                Sign in with your Omnora Student ID to continue your AI learning,
                quizzes, study plans, academic progress, and future educational opportunities.
            </p>

        </div>

    </section>

    <!-- Login -->

    <section class="login-section">

        <div class="container">

            <form
                class="student-login-form"
                id="studentLoginForm"
            >

                <h2>
                    Student Login
                </h2>

                <input
    id="omsId"
    type="text"
    placeholder="Enter your OMS-ID"
    required>

                <input
    id="password"
    type="password"
    placeholder="Enter your Password"
    required>

                <label class="remember">

                    <input
    id="rememberMe"
    type="checkbox">

                    Remember Me (Optional)

                </label>

                <button type="submit">

                    🚀 Sign In

                </button>

                <p class="forgot-id">

                    <a href="#">

                        Forgot your OMS-ID?

                    </a>

                </p>

                <p class="register-text">

                    Don't have an account?

                    <a
                        href="student-register-page.html"
                        class="register-link"
                    >

                        Create Student Account

                    </a>

                </p>

            </form>

        </div>

    </section>

</main>


            <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script src="js/resolver.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script src="js/student-login.js"></script>

</body>

</html>
